# ============================================
# Default Configuration for Local Development
# ============================================
# For production on Railway, use application-prod.properties
# or set environment variables in Railway dashboard
# ============================================

spring.application.name=${SPRING_APPLICATION_NAME:EVMBackend}
server.port=${SERVER_PORT:8080}

# ============================================
# DATABASE CONFIGURATION (Local Development)
# ============================================
# For production: Set environment variables in Railway
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:evm}?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:password}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}

# ============================================
# JWT CONFIGURATION
# ============================================
# WARNING: NEVER hardcode secrets in production!
# Use environment variables in Railway dashboard
app.jwt.secret=${APP_JWT_SECRET:dev-secret-key-change-in-production-with-32-byte-hex-string}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ============================================
# EMAIL/SMTP CONFIGURATION
# ============================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:${MAIL_USERNAME:your-email@gmail.com}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:your-app-password}}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

app.mail.from=${APP_MAIL_FROM:${MAIL_USERNAME:your-email@gmail.com}}

# ============================================
# OTP CONFIGURATION
# ============================================
app.otp.ttl-ms=${APP_OTP_TTL_MS:300000}
app.otp.resend-cooldown-ms=${APP_OTP_RESEND_COOLDOWN_MS:60000}

# ============================================
# CORS CONFIGURATION
# ============================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# ============================================
# LOGGING (Development)
# ============================================
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.election.evm=${LOGGING_LEVEL_COM_ELECTION_EVM:DEBUG}
