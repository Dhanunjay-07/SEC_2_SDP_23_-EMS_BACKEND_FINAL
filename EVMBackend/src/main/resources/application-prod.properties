# ============================================
# PRODUCTION Configuration for Railway Deployment
# ============================================
# These properties use environment variables
# Set in Railway Dashboard under Variables tab
# ============================================

# Application Name
spring.application.name=${SPRING_APPLICATION_NAME:EVMBackend}

# Server Configuration (Railway assigns port automatically)
server.port=${SERVER_PORT:8080}
server.compression.enabled=true
server.compression.min-response-size=1024
server.error.whitelabel.enabled=false

# ============================================
# DATABASE CONFIGURATION (Railway MySQL)
# ============================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# Connection Pool Settings (Important for Railway)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# ============================================
# JPA & Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

# Production: Disable SQL logging
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}

# Hibernate properties
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ============================================
# JWT CONFIGURATION (FROM ENVIRONMENT VARIABLES)
# ============================================
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:120000000}

# ============================================
# GOOGLE OAUTH2 CONFIGURATION
# ============================================
spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_SCOPE:openid,profile,email}
spring.security.oauth2.client.registration.google.redirect-uri=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_REDIRECT_URI}

# Frontend redirect URL (after successful OAuth login)
app.oauth2.frontend-redirect-url=${APP_OAUTH2_FRONTEND_REDIRECT_URL}

# ============================================
# EMAIL/SMTP CONFIGURATION (Gmail)
# ============================================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email sender address
app.mail.from=${APP_MAIL_FROM}

# ============================================
# OTP CONFIGURATION
# ============================================
app.otp.ttl-ms=${APP_OTP_TTL_MS:300000}
app.otp.resend-cooldown-ms=${APP_OTP_RESEND_COOLDOWN_MS:60000}

# ============================================
# CORS CONFIGURATION
# ============================================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=${LOGGING_LEVEL_ROOT:WARN}
logging.level.com.election.evm=${LOGGING_LEVEL_COM_ELECTION_EVM:INFO}
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# Log format for Railway
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# ============================================
# ACTUATOR (OPTIONAL - for monitoring)
# ============================================
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized

# ============================================
# JACKSON CONFIGURATION
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=false

# ============================================
# SESSION CONFIGURATION
# ============================================
spring.session.store-type=none
server.servlet.session.persistence=false
server.servlet.session.timeout=30m
